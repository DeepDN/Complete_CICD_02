name: GitHub Actions Demo
on: 
  push:
    branches:
      - main
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
 jobs:
  Install_node:
    runs-on: ubuntu-latest
    steps:
      - name: node dependencies
        run: npm i
      - name: check npm version
        run: npm --version
        
